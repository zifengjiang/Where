name: Where
options:
  bundleIdPrefix: com.zifengjiang
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    exactVersion: 7.10.0
targets:
  Where:
    type: application
    platform: iOS
    sources: Where
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zifengjiang.Where
        PRODUCT_NAME: Where
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: GRDB
        product: GRDB
  WhereTests:
    type: bundle.unit-test
    platform: iOS
    sources: WhereTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Where
      - package: GRDB
        product: GRDB
  WhereUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: WhereUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Where

